[profile]
id = "eu-like"
label = "EU-like"
map_mode = "1444-ready modern scaffold"
era = "1444-ready"
description = "Dense province profile for EU-style gameplay and later historical ownership overlays."

[sources]
default = ["natural_earth", "geoboundaries"]
deferred = ["ghsl", "worldpop"]
optional = ["open_historical_map"]
excluded = ["openstreetmap", "gadm"]

[generation]
target_province_count = 22000
target_region_count = 2600
land_detail = "high"
sea_zone_strategy = "dense-coastal-seas-and-straits"
population_weighting = true
historical_overrides = true

[refinement]
population_weight = 0.6
min_area_sq_km = 20.0
min_population = 250.0
max_split_parts = 64
max_seed_candidates = 512

[export]
layout = "eu-like"
region_type = "region"
include_sea_zones = true
include_geometry = true
definition_format = "json"
localization_language = "english"

[qa]
topology_required = true
render_required = true
max_overlap_area_sq_km = 1.0
max_gap_component_area_sq_km = 10.0
min_shared_border_km = 0.01
