[profile]
id = "victoria-like"
label = "Victoria-like"
map_mode = "1836-ready modern scaffold"
era = "1836-ready"
description = "Population and state-region oriented profile for Victoria-style gameplay."

[sources]
default = ["natural_earth", "geoboundaries"]
deferred = ["ghsl", "worldpop"]
optional = ["open_historical_map"]
excluded = ["openstreetmap", "gadm"]

[generation]
target_province_count = 12000
target_region_count = 1600
land_detail = "medium-detailed"
sea_zone_strategy = "trade-coasts-and-oceans"
population_weighting = true
historical_overrides = true

[refinement]
population_weight = 0.75
min_area_sq_km = 50.0
min_population = 500.0
max_split_parts = 64
max_seed_candidates = 512

[export]
layout = "victoria-like"
region_type = "state"
include_sea_zones = true
include_geometry = true
definition_format = "json"
localization_language = "english"

[qa]
topology_required = true
render_required = true
max_overlap_area_sq_km = 1.0
max_gap_component_area_sq_km = 10.0
min_shared_border_km = 0.01
