[profile]
id = "hoi-like"
label = "HOI-like"
map_mode = "1936-ready modern scaffold"
era = "1936-ready"
description = "State and strategic-area oriented profile for HOI-style gameplay."

[sources]
default = ["natural_earth", "geoboundaries"]
deferred = ["ghsl", "worldpop"]
optional = ["open_historical_map"]
excluded = ["openstreetmap", "gadm"]

[generation]
target_province_count = 9000
target_region_count = 900
land_detail = "medium"
sea_zone_strategy = "strategic-seas-and-chokepoints"
population_weighting = true
historical_overrides = true

[refinement]
population_weight = 0.55
min_area_sq_km = 75.0
min_population = 1000.0
max_split_parts = 64
max_seed_candidates = 512

[export]
layout = "hoi-like"
region_type = "strategic_region"
include_sea_zones = true
include_geometry = true
definition_format = "json"
localization_language = "english"

[qa]
topology_required = true
render_required = true
max_overlap_area_sq_km = 1.0
max_gap_component_area_sq_km = 10.0
min_shared_border_km = 0.01
